<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>M17LIV3 - Cartelera</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;user-select:none;-webkit-user-select:none;}
body{background:#0d0d14;color:#eeeef5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;}
.header{width:100%;background:linear-gradient(180deg,#13131e 0%,rgba(13,13,20,0) 100%);padding:24px 20px 16px;text-align:center;border-bottom:1px solid rgba(0,229,255,0.1);}
.header img{height:56px;margin-bottom:8px;}
.header h1{font-size:13px;letter-spacing:4px;text-transform:uppercase;color:#00e5ff;font-weight:600;}
.container{width:100%;max-width:600px;padding:24px 16px 40px;}

/* Evento card (azul) */
.evento-card{border-radius:16px;overflow:hidden;margin-bottom:20px;background:linear-gradient(135deg,rgba(0,229,255,0.08),rgba(105,255,71,0.05));border:1px solid rgba(0,229,255,0.25);}
.evento-label{padding:10px 16px;font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#00e5ff;border-bottom:1px solid rgba(0,229,255,0.15);background:rgba(0,229,255,0.05);text-align:center;}
.evento-card img{width:100%;display:block;max-height:320px;object-fit:cover;}

/* Cartelera card (verde) - fecha + texto dentro */
.cartelera-card{border-radius:16px;overflow:hidden;margin-bottom:20px;background:linear-gradient(135deg,rgba(105,255,71,0.08),rgba(0,229,255,0.06));border:1px solid rgba(105,255,71,0.35);}
.cartelera-fecha{padding:12px 16px;font-size:13px;font-weight:700;letter-spacing:2px;text-align:center;color:#69ff47;border-bottom:1px solid rgba(105,255,71,0.2);background:rgba(105,255,71,0.05);}
.cartelera-texto{padding:18px 16px;font-size:15px;line-height:1.7;white-space:pre-wrap;word-break:break-word;color:#eeeef5;}

.empty{text-align:center;padding:60px 20px;color:rgba(238,238,245,0.3);font-size:14px;}
.empty span{font-size:48px;display:block;margin-bottom:12px;}
.loading{text-align:center;padding:80px 20px;color:rgba(0,229,255,0.5);font-size:13px;}
.error-box{background:rgba(255,50,50,0.1);border:1px solid rgba(255,50,50,0.3);border-radius:12px;padding:16px;margin-bottom:20px;font-size:12px;color:#ff6b6b;word-break:break-all;}
.footer{margin-top:auto;padding:20px;text-align:center;font-size:11px;color:rgba(238,238,245,0.2);}
.refresh-btn{display:block;margin:0 auto 20px;background:rgba(0,229,255,0.1);border:1px solid rgba(0,229,255,0.3);color:#00e5ff;padding:10px 28px;border-radius:20px;font-size:13px;cursor:pointer;}
</style>
</head>
<body>
<div class="header">
  <img src="logo.png" alt="M17LIV3" onerror="this.style.display='none'"/>
  <h1>Cartelera del d&iacute;a</h1>
</div>
<div class="container">
  <div id="content"><div class="loading">&#9203; Cargando...</div></div>
  <button class="refresh-btn" onclick="loadData()">&#8635; Actualizar</button>
</div>
<div class="footer">M17LIV3 &copy; 2025</div>
<script>
var BIN_ID = '6a330946da38895dfed2f865';
var KEY = '$2a$10$9ikO.ZJ.tHgDUL0ddUaO.eNMFAT5S6FGO.Ub6rJKwpIsE/Mr/L2xG';

var dias = ['Domingo','Lunes','Martes','Miercoles','Jueves','Viernes','Sabado'];
var meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
var now = new Date();
var fechaTxt = '\u{1F4C5} ' + dias[now.getDay()] + ', ' + now.getDate() + ' de ' + meses[now.getMonth()] + ' ' + now.getFullYear() + ' \u2600\uFE0F';

async function loadData() {
  var el = document.getElementById('content');
  el.innerHTML = '<div class="loading">&#9203; Cargando...</div>';
  try {
    var res = await fetch('https://api.jsonbin.io/v3/b/' + BIN_ID + '/latest', {
      headers: { 'X-Master-Key': KEY, 'X-Access-Key': KEY }
    });
    var txt = await res.text();
    if (!res.ok) {
      el.innerHTML = '<div class="error-box">Error HTTP ' + res.status + ': ' + txt.substring(0,200) + '</div>';
      return;
    }
    var data = JSON.parse(txt);
    var rec = data.record || {};
    var texto = (rec.texto || '').trim();
    var imgUrl = (rec.imagen_dia || '').trim();

    var h = '';

    // 1) EVENTO (imagen) - siempre primero si existe
    if (imgUrl) {
      h += '<div class="evento-card">';
      h += '<div class="evento-label">&#11088; Evento exclusivo del d&iacute;a &#11088;</div>';
      h += '<img src="' + imgUrl + '" alt="Evento"/>';
      h += '</div>';
    }

    // 2) CARTELERA card verde - fecha arriba, texto dentro
    h += '<div class="cartelera-card">';
    h += '<div class="cartelera-fecha">' + fechaTxt + '</div>';
    if (texto) {
      h += '<div class="cartelera-texto">' + texto.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>') + '</div>';
    } else {
      h += '<div class="cartelera-texto" style="color:rgba(238,238,245,0.3);text-align:center;padding:30px 16px;">No hay contenido publicado a&uacute;n</div>';
    }
    h += '</div>';

    el.innerHTML = h;

    // Registrar visita
    try {
      var today = new Date().toISOString().slice(0,10);
      var visits = rec.visits || {};
      visits[today] = (visits[today] || 0) + 1;
      await fetch('https://api.jsonbin.io/v3/b/' + BIN_ID, {
        method: 'PUT',
        headers: {'Content-Type':'application/json','X-Master-Key':KEY,'X-Access-Key':KEY},
        body: JSON.stringify(Object.assign({}, rec, {visits: visits}))
      });
    } catch(e) {}

  } catch(e) {
    el.innerHTML = '<div class="error-box">Error: ' + e.message + '</div>';
  }
}
loadData();
</script>
</body>
</html>
